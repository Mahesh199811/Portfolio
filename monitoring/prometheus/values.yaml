# kube-prometheus-stack Helm values
# Install: helm install monitoring prometheus-community/kube-prometheus-stack -f monitoring/prometheus/values.yaml -n monitoring --create-namespace

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    additionalScrapeConfigs:
      - job_name: 'portfolio-backend'
        static_configs:
          - targets: ['backend.portfolio.svc.cluster.local:5000']
        metrics_path: /metrics

grafana:
  enabled: true
  adminPassword: "admin_change_me"
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'portfolio'
          folder: 'Portfolio'
          type: file
          options:
            path: /var/lib/grafana/dashboards/portfolio
  dashboardsConfigMaps:
    portfolio: "grafana-portfolio-dashboard"

alertmanager:
  enabled: true
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi
